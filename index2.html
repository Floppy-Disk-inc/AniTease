        <script>
        window.onYouTubeIframeAPIReady = function () {
            var p = document.getElementById('trailer-player');
            if (!p) return;
            window.__ytPlayer = new YT.Player('trailer-player', {
                height: '450',
                width: '100%',
                videoId: '',
                playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 },
                events: {
                    'onReady': function (e) {
                        window.__ytPlayerReady = true;
                        if (window.__pendingVideoId) {
                            e.target.loadVideoById(window.__pendingVideoId);
                            window.__pendingVideoId = null;
                        }
                    }
                }
            });
        };
        </script>
        <script async src="https://www.youtube.com/iframe_api"></script>
